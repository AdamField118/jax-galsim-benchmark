simulation:
  hlr: 0.5                  # used when galaxy.hlr_type == constant
  flux: 12258.97             # used when galaxy.flux_type == constant
  hlr_type: constant         # constant | catalog
  flux_type: constant        # constant | catalog
  scale: 0.141                # pixel scale (arcsec/pixel)
  npix: 53
  noise_sd: 12.719674         # per-pixel noise sigma
  seed: 150
  n_obs: 10000                 # number of galaxies to simulate (in the timed comparison)
  shear_true: 0.01            # applied +/- shear used for the sheared pair
  ellipticity_sigma: 0.26     # std dev of the synthetic G1/G2 fallback,
                               # only used if paths.cosmos_cat_fname is missing
                               # (matches shearnet/core/dataset.py's fallback)

psf:
  mode: superbit               # superbit = empirical PSFEx models from
                                # paths.psf_data_dir | ideal = analytic Gaussian
  fwhm: 0.5                    # used only when mode: ideal
  npix: 53
  noise: 1.0e-6

# Both paths are resolved relative to this config file's directory (src/) by
# main.py, so by default they point at the repo root, i.e. siblings of src/.
# If either is missing, generation falls back to synthetic ellipticities /
# an analytic Gaussian PSF and prints a warning.
paths:
  cosmos_cat_fname: "../cosmos_catalog_eval.fits"
  psf_data_dir: "../psf_data/emp_psfs_best/psfex-output"

output:
  dir: "results"

comparison:
  jax_warmup_galaxies: 50     # untimed jax-galsim galaxies rendered up front to
                               # trigger JIT compilation, so the timed comparison
                               # below is apples-to-apples with galsim (which
                               # needs no warmup). Only used for the eager path.

  # jax-galsim rendering strategy. "eager" is the naive one-object-at-a-time
  # drop-in (correct but does NOT use a GPU -- ~1,500 serial kernel launches
  # per object). "batched" uses jit(vmap(...)) over batches with a pinned FFT
  # size, which is what actually saturates a GPU. See ANALYSIS.md.
  jax_mode: batched           # batched | eager | both
  jax_batch_size: 512         # objects per jit(vmap) call (bounds device memory:
                               # ~batch_size * fft_size^2 complex values per chunk)
  jax_fft_size: 256           # pinned min==max FFT size (must cover the stamp;
                               # larger = more accurate but more memory/compute)
